name: CI — Ask SIO

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Frontend (React + Vite)
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─────────────────────────────────────────
  # JOB 2 : Backend (FastAPI + Python)
  # ─────────────────────────────────────────
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__

      - name: Run tests
        run: pytest --tb=short
        env:
          OPENAI_API_KEY: sk-fake-key-for-ci
          JWT_SECRET: ci_test_secret
          CHROMA_PATH: ./chroma_db_test
