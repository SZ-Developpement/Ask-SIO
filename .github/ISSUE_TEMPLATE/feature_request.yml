name: Feature Request
description: Proposer une nouvelle fonctionnalité
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problème à résoudre
      placeholder: "Ex : Les étudiants ne peuvent pas filtrer les réponses par matière..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées

  - type: dropdown
    id: priority
    attributes:
      label: Priorité estimée
      options:
        - 🔴 Haute — bloquant / essentiel
        - 🟡 Moyenne — utile mais pas urgent
        - 🟢 Basse — nice to have
    validations:
      required: true
