name: Bug Report
description: Signaler un bug ou un comportement inattendu
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      placeholder: "Ex : Quand j'importe un PDF, la vectorisation échoue..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      value: |
        1. Aller sur '...'
        2. Faire '...'
        3. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs d'erreur

  - type: dropdown
    id: area
    attributes:
      label: Zone concernée
      options:
        - Frontend / UI
        - Backend / FastAPI
        - RAG / ChromaDB
        - Agents IA
        - Authentification
        - Autre
    validations:
      required: true
